<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Okiem Diabetyka</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="header"></div>
<div id="menu"></div>

<main class="container">

  <h1>Dashboard</h1>

  <div class="grid">

    <div class="card">
      <h2>Średnia glukoza (mg/dL)</h2>
      <input type="number" id="avg" placeholder="np. 210" oninput="czyscHbA1c()">
    </div>

    <div class="card">
      <h2>HbA1c (%)</h2>
      <input type="number" id="hba1c" placeholder="np. 8.5" oninput="czyscAvg()">
    </div>

    <div class="card">
      <h2>Komunikat</h2>
      <p id="komunikat">Wprowadź dane</p>
    </div>

  </div>

  <button onclick="oblicz()">Oblicz</button>

</main>

<div id="footer"></div>

<script src="assets/app.js"></script>

<script>
loadComponent("header", "components/header.html");
loadComponent("menu", "components/menu.html");
loadComponent("footer", "components/footer.html");
setTimeout(startClock, 200);

// czyszczenie pól
function czyscHbA1c() {
  document.getElementById("hba1c").value = "";
}
function czyscAvg() {
  document.getElementById("avg").value = "";
}

// główna logika
function oblicz() {
  const avg = parseFloat(document.getElementById("avg").value);
  const hba = parseFloat(document.getElementById("hba1c").value);

  if (!isNaN(avg) && avg > 0) {
    const wynik = ((avg + 46.7) / 28.7).toFixed(2);
    document.getElementById("hba1c").value = wynik;
    komunikat(wynik);
  } 
  else if (!isNaN(hba) && hba > 0) {
    const wynik = (28.7 * hba - 46.7).toFixed(0);
    document.getElementById("avg").value = wynik;
    komunikat(hba);
  } 
  else {
    alert("Wpisz wartość w jednym polu");
  }
}

// komunikaty
function komunikat(hba) {
  let tekst = "";

  if (hba < 5.7) {
    tekst = "🟢 Norma – utrzymaj ten poziom";
  } 
  else if (hba < 6.5) {
    tekst = "🟡 Blisko normy – pilnuj, żeby nie wzrosło";
  } 
  else if (hba < 7.5) {
    tekst = "🟠 Do poprawy – jesteś blisko kontroli";
  } 
  else if (hba < 9) {
    tekst = "🔴 Wysokie – działamy: dieta + ruch";
  } 
  else {
    tekst = "🚨 Alarm – zacznij od podstaw (jedzenie + spacer)";
  }

  document.getElementById("komunikat").innerText = tekst;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>HbA1c</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="header"></div>
<div id="menu"></div>

<main class="container">

  <h1>Kalkulator HbA1c</h1>

  <div class="card">
    <label>Średnia glukoza (mg/dL):</label>
    <input type="number" id="avg" placeholder="np. 210">

    <button onclick="obliczHbA1c()">Oblicz</button>

    <h2 id="wynik">HbA1c: -- %</h2>
    <p id="opis"></p>
  </div>

</main>

<div id="footer"></div>

<script src="assets/app.js"></script>

<script>
  loadComponent("header", "components/header.html");
  loadComponent("menu", "components/menu.html");
  loadComponent("footer", "components/footer.html");

  setTimeout(startClock, 200);

  function obliczHbA1c() {
    const avg = parseFloat(document.getElementById("avg").value);

    if (isNaN(avg) || avg <= 0) {
      alert("Podaj poprawną średnią");
      return;
    }

    const hba1c = ((avg + 46.7) / 28.7).toFixed(2);

    document.getElementById("wynik").innerText = "HbA1c: " + hba1c + " %";

    // interpretacja (prosta)
    let opis = "";

    if (hba1c < 5.7) opis = "Norma";
    else if (hba1c < 6.5) opis = "Stan przedcukrzycowy";
    else if (hba1c < 8) opis = "Cukrzyca – umiarkowana kontrola";
    else opis = "Wysokie HbA1c – do poprawy";

    document.getElementById("opis").innerText = opis;
  }
</script>

</body>
</html>
